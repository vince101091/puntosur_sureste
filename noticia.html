<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nota – Punto Sur</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #1e293b; }

  header {
    background: #0f172a; color: #fff;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  header a { color: #94a3b8; text-decoration: none; font-size: .85rem; font-weight: 600; }
  header a:hover { color: #fff; }
  header h1 { font-size: 1.1rem; font-weight: 800; }

  .article-wrap {
    max-width: 720px; margin: 2rem auto; padding: 0 1.25rem;
  }

  .cat-badge {
    display: inline-block; background: #6366f1; color: #fff;
    font-size: .72rem; font-weight: 700; padding: .2rem .65rem; border-radius: 99px;
    margin-bottom: .75rem;
  }

  h2.titulo {
    font-size: 1.75rem; font-weight: 800; line-height: 1.25;
    color: #0f172a; margin-bottom: .75rem;
  }
  @media(max-width:500px){ h2.titulo { font-size: 1.35rem; } }

  .resumen {
    font-size: 1.05rem; color: #475569; line-height: 1.55;
    border-left: 3px solid #6366f1; padding-left: .9rem;
    margin-bottom: 1.25rem;
  }

  .meta { font-size: .78rem; color: #94a3b8; margin-bottom: 1.25rem; }

  .img-principal {
    width: 100%; border-radius: 10px; margin-bottom: 1.5rem;
    aspect-ratio: 16/9; object-fit: cover; display: block;
  }

  .cuerpo {
    font-size: 1rem; line-height: 1.7; color: #334155;
  }
  .cuerpo p { margin-bottom: 1rem; }

  .share {
    margin-top: 2rem; padding-top: 1.25rem;
    border-top: 1px solid #e2e8f0;
    display: flex; gap: .75rem; align-items: center; flex-wrap: wrap;
  }
  .share span { font-size: .82rem; font-weight: 700; color: #64748b; }
  .share a {
    padding: .35rem .85rem; border-radius: 6px;
    font-size: .82rem; font-weight: 700; text-decoration: none; color: #fff;
  }
  .share .tw { background: #0f1419; }
  .share .wa { background: #25d366; }
  .share .fb { background: #1877f2; }

  .volver {
    display: inline-block; margin-top: 1.5rem;
    font-size: .82rem; font-weight: 700; color: #6366f1; text-decoration: none;
  }
  .volver:hover { text-decoration: underline; }

  .spinner { text-align: center; padding: 4rem; color: #94a3b8; }
  .error   { text-align: center; padding: 4rem; color: #ef4444; }

  footer {
    text-align: center; padding: 1.5rem; font-size: .78rem; color: #94a3b8;
    border-top: 1px solid #e2e8f0; margin-top: 3rem;
  }
</style>
</head>
<body>

<header>
  <a href="index.html">← Inicio</a>
  <h1>Punto Sur</h1>
</header>

<div class="article-wrap" id="nota">
  <div class="spinner">Cargando…</div>
</div>

<footer>© 2025 Punto Sur Sureste</footer>

<script>
// ⚠️ Reemplaza con la URL de tu Worker
const API = "https://puntosursureste.vinceremx.workers.dev/";

const slug = new URLSearchParams(location.search).get("slug");

function fecha(ts) {
  return new Date(ts).toLocaleDateString("es-AR", {
    weekday: "long", day: "2-digit", month: "long", year: "numeric"
  });
}

// Convierte saltos de línea en párrafos HTML
function parseBody(txt) {
  if (!txt) return "";
  return txt.split(/\n+/).map(p => p.trim()).filter(Boolean)
    .map(p => `<p>${p}</p>`).join("");
}

async function cargar() {
  const nota = document.getElementById("nota");

  if (!slug) {
    nota.innerHTML = '<div class="error">No se especificó una nota.</div>';
    return;
  }

  try {
    const res  = await fetch(API + "/api/noticia?slug=" + encodeURIComponent(slug));
    const data = await res.json();
    const n    = data.articulo;

    if (!n) {
      nota.innerHTML = '<div class="error">Nota no encontrada.</div>';
      return;
    }

    document.title = n.titulo + " – Punto Sur";

    const pageUrl = encodeURIComponent(location.href);
    const tituloEnc = encodeURIComponent(n.titulo);

    nota.innerHTML = `
      ${n.categoria ? `<span class="cat-badge">${n.categoria}</span>` : ""}
      <h2 class="titulo">${n.titulo}</h2>
      ${n.resumen ? `<p class="resumen">${n.resumen}</p>` : ""}
      <div class="meta">
        ${n.autor ? `Por <strong>${n.autor}</strong> · ` : ""}
        ${fecha(n.timestamp)}
      </div>
      ${n.img_url
        ? `<img class="img-principal" src="${n.img_url}" alt="${n.titulo}">`
        : ""}
      <div class="cuerpo">${parseBody(n.cuerpo)}</div>
      <div class="share">
        <span>Compartir:</span>
        <a class="tw" href="https://twitter.com/intent/tweet?text=${tituloEnc}&url=${pageUrl}" target="_blank">X / Twitter</a>
        <a class="wa" href="https://wa.me/?text=${tituloEnc}%20${pageUrl}" target="_blank">WhatsApp</a>
        <a class="fb" href="https://www.facebook.com/sharer/sharer.php?u=${pageUrl}" target="_blank">Facebook</a>
      </div>
      <a class="volver" href="index.html">← Volver al inicio</a>
    `;

  } catch (e) {
    nota.innerHTML = `<div class="error">Error al cargar: ${e.message}</div>`;
  }
}

cargar();
</script>

</body>
</html>
